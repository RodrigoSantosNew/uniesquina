<!DOCTYPE html>
<html>
<head>
    
    <meta charset="UTF-8">
    
    <title>Cadastro</title>
    
</head>

<body>

    <h1>Cadastro de Usuário</h1>

    <form action="cadastro" method="post">

        <label>Nome:</label>
        <br>
        
        <input type="text" name="nome">
        
        <br><br>

        <label>Email:</label>
        <br>
        
        <input type="email" name="email">
        
        <br><br>

        <label>Senha:</label>
        <br>
        
        <input type="password" name="senha">
        
        <br><br>

        <button type="submit">
            Cadastrar
        </button>

    </form>

</body>
</html>
